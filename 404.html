<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page not found · Aditya Raj Pandey</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; box-sizing: border-box; }
    body {
      font-family: "Inter", system-ui, sans-serif; min-height: 100svh;
      display: grid; place-items: center; text-align: center; padding: 2rem;
      color: #fff; background: radial-gradient(circle at 30% 20%, #0353a4, #001233 70%);
    }
    .code { font-size: clamp(4rem, 18vw, 9rem); font-weight: 800; letter-spacing: -0.05em; line-height: 1;
      background: linear-gradient(120deg, #9fd0ff, #0466c8); -webkit-background-clip: text; background-clip: text; color: transparent; }
    h1 { font-size: clamp(1.3rem, 4vw, 1.9rem); margin: 1rem 0 .5rem; font-weight: 800; }
    p { color: rgba(255,255,255,.7); max-width: 42ch; margin: 0 auto 2rem; }
    a { display: inline-flex; gap: .5rem; align-items: center; background: #0466c8; color: #fff;
      text-decoration: none; font-weight: 600; padding: .85rem 1.4rem; border-radius: 999px;
      transition: transform .2s, background .2s; }
    a:hover { background: #0a73db; transform: translateY(-2px); }
  </style>
</head>
<body>
  <div>
    <div class="code">404</div>
    <h1>This page wandered off.</h1>
    <p>The link may be broken or the page may have moved. Let's get you back on track.</p>
    <a href="/">← Back to home</a>
  </div>
</body>
</html>
